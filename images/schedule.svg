<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <style>
      .mono { font-family: 'Consolas','Courier New',monospace; }
      .green   { fill: #0dbc79; }
      .cyan    { fill: #29b8db; }
      .yellow  { fill: #e5e510; }
      .dim     { fill: #555555; }
      .magenta { fill: #c586c0; }
      .red     { fill: #f44747; }
      .white   { fill: #cccccc; }
    </style>
    <linearGradient id="titleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c586c0"/>
      <stop offset="100%" stop-color="#29b8db"/>
    </linearGradient>
  </defs>

  <!-- Window background -->
  <rect width="720" height="420" fill="#0c0c0c" rx="10"/>

  <!-- Title bar -->
  <rect width="720" height="32" fill="#1c1c1c" rx="10"/>
  <rect y="22" width="720" height="10" fill="#1c1c1c"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="360" y="21" text-anchor="middle" font-size="12" fill="#999" class="mono">Windows 11 Cleaner Pro v3.0 — Administrator</text>

  <!-- Section header -->
  <text x="32" y="65"  font-size="13" class="mono dim">  +==============================================================+</text>
  <text x="32" y="83"  font-size="13" class="mono" fill="url(#titleGrad2)" font-weight="bold">  |   [7]  DINH KY TU DONG                                    |</text>
  <text x="32" y="101" font-size="13" class="mono magenta">  |   Quan ly lich don rac qua Windows Task Scheduler          |</text>
  <text x="32" y="119" font-size="13" class="mono dim">  +==============================================================+</text>

  <!-- Sub-menu options -->
  <text x="32" y="143" font-size="13" class="mono dim">  |                                                            |</text>
  <text x="32" y="161" font-size="13" class="mono cyan">  |   [7.1]  Cai dat lich moi                                 |</text>
  <text x="32" y="179" font-size="13" class="mono dim">  |          Chon tan suat + gio chay, tao Task Scheduler      |</text>
  <text x="32" y="197" font-size="13" class="mono dim">  |                                                            |</text>
  <text x="32" y="215" font-size="13" class="mono cyan">  |   [7.2]  Xem lich dang cai                                |</text>
  <text x="32" y="233" font-size="13" class="mono dim">  |          Hien thi chi tiet task Win11CleanerPro            |</text>
  <text x="32" y="251" font-size="13" class="mono dim">  |                                                            |</text>
  <text x="32" y="269" font-size="13" class="mono red">  |   [7.3]  Xoa lich                                         |</text>
  <text x="32" y="287" font-size="13" class="mono dim">  |          Hoi xac nhan truoc khi xoa task                   |</text>
  <text x="32" y="305" font-size="13" class="mono dim">  |                                                            |</text>
  <text x="32" y="323" font-size="13" class="mono dim">  |   [0]  Quay lai menu chinh                                |</text>
  <text x="32" y="341" font-size="13" class="mono dim">  +==============================================================+</text>

  <!-- Frequency step hint box -->
  <rect x="32" y="354" width="656" height="52" fill="#111" rx="6" stroke="#c586c0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="48" y="372" font-size="12" class="mono">
    <tspan fill="#555">  Tan suat khi cai moi: </tspan>
    <tspan fill="#0dbc79" font-weight="bold">[1] Hang ngay</tspan>
    <tspan fill="#555">  |  </tspan>
    <tspan fill="#29b8db" font-weight="bold">[2] Hang tuan (CN)</tspan>
    <tspan fill="#555">  |  </tspan>
    <tspan fill="#e5e510" font-weight="bold">[3] Hang thang (ngay 1)</tspan>
  </text>
  <text x="48" y="393" font-size="12" class="mono">
    <tspan fill="#555">  Nhap gio chay: </tspan>
    <tspan fill="#c586c0" font-weight="bold">HH</tspan>
    <tspan fill="#555"> hoac </tspan>
    <tspan fill="#c586c0" font-weight="bold">HH:MM</tspan>
    <tspan fill="#555">   ·   Vi du: </tspan>
    <tspan fill="#cccccc">3  →  03:00    14:30  →  14:30</tspan>
  </text>
</svg>
