<svg xmlns="http://www.w3.org/2000/svg" width="720" height="130" viewBox="0 0 720 130">
  <defs>
    <style>.ui{font-family:'Segoe UI','Arial',sans-serif;}</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="720" height="130" fill="#0d1117" rx="10"/>

  <!-- Step boxes -->
  <!-- 1: Cleaner.bat -->
  <rect x="20" y="40" width="120" height="50" fill="#1e2a45" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
  <text x="80" y="62" text-anchor="middle" font-size="12" fill="#60a5fa" class="ui" font-weight="700">Cleaner.bat</text>
  <text x="80" y="78" text-anchor="middle" font-size="10" fill="#7d8fae" class="ui">Menu + Logic</text>

  <line x1="140" y1="65" x2="170" y2="65" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2: Dọn hệ thống -->
  <rect x="175" y="40" width="130" height="50" fill="#14532d18" stroke="#22c55e" stroke-width="1.5" rx="8"/>
  <text x="240" y="62" text-anchor="middle" font-size="12" fill="#4ade80" class="ui" font-weight="700">Dọn hệ thống</text>
  <text x="240" y="78" text-anchor="middle" font-size="10" fill="#7d8fae" class="ui">Temp/Cache/DL/Bin</text>

  <line x1="305" y1="65" x2="335" y2="65" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3: stats.json -->
  <rect x="340" y="40" width="120" height="50" fill="#78350f18" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#fbbf24" class="ui" font-weight="700">stats.json</text>
  <text x="400" y="78" text-anchor="middle" font-size="10" fill="#7d8fae" class="ui">PowerShell ghi</text>

  <line x1="460" y1="65" x2="490" y2="65" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4: Python Server -->
  <rect x="495" y="40" width="115" height="50" fill="#1c1f2e" stroke="#a855f7" stroke-width="1.5" rx="8"/>
  <text x="552" y="62" text-anchor="middle" font-size="12" fill="#c084fc" class="ui" font-weight="700">Python Server</text>
  <text x="552" y="78" text-anchor="middle" font-size="10" fill="#7d8fae" class="ui">localhost:8742</text>

  <line x1="610" y1="65" x2="640" y2="65" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5: Dashboard -->
  <rect x="645" y="40" width="60" height="50" fill="#1e2a45" stroke="#60a5fa" stroke-width="1.5" rx="8"/>
  <text x="675" y="59" text-anchor="middle" font-size="11" fill="#60a5fa" class="ui" font-weight="700">Dash</text>
  <text x="675" y="73" text-anchor="middle" font-size="10" fill="#7d8fae" class="ui">board</text>
  <text x="675" y="86" text-anchor="middle" font-size="9" fill="#4a5a7a" class="ui">Browser</text>

  <!-- Labels below -->
  <text x="80"  y="110" text-anchor="middle" font-size="9" fill="#4a5a7a" class="ui">① Run as Admin</text>
  <text x="240" y="110" text-anchor="middle" font-size="9" fill="#4a5a7a" class="ui">② Xóa file rác</text>
  <text x="400" y="110" text-anchor="middle" font-size="9" fill="#4a5a7a" class="ui">③ Lưu thống kê</text>
  <text x="552" y="110" text-anchor="middle" font-size="9" fill="#4a5a7a" class="ui">④ Serve HTTP</text>
  <text x="675" y="110" text-anchor="middle" font-size="9" fill="#4a5a7a" class="ui">⑤ Hiển thị</text>
</svg>
