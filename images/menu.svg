<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340">
  <defs>
    <style>
      .mono { font-family: 'Consolas','Courier New',monospace; }
      .green { fill: #0dbc79; }
      .cyan  { fill: #29b8db; }
      .yellow{ fill: #e5e510; }
      .dim   { fill: #555555; }
      .magenta { fill: #c586c0; }
    </style>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0dbc79"/>
      <stop offset="100%" stop-color="#29b8db"/>
    </linearGradient>
  </defs>

  <!-- Window background -->
  <rect width="720" height="340" fill="#0c0c0c" rx="10"/>

  <!-- Title bar -->
  <rect width="720" height="32" fill="#1c1c1c" rx="10"/>
  <rect y="22" width="720" height="10" fill="#1c1c1c"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="360" y="21" text-anchor="middle" font-size="12" fill="#999" class="mono">Windows 11 Cleaner Pro v3.0 — Administrator</text>

  <!-- Content -->
  <text x="32" y="65"  font-size="13" class="mono dim">  +==============================================================+</text>
  <text x="32" y="83"  font-size="13" class="mono" fill="url(#titleGrad)" font-weight="bold">  |  WINDOWS 11 CLEANER PRO  v3.0                              |</text>
  <text x="32" y="101" font-size="13" class="mono green">  |  Cong Cu Don Rac He Thong - Windows 11                     |</text>
  <text x="32" y="119" font-size="13" class="mono dim">  +==============================================================+</text>
  <text x="32" y="137" font-size="13" class="mono dim">  |                                                            |</text>
  <text x="32" y="155" font-size="13" class="mono cyan">  |   [1]  Don Temp     ( %TEMP% + C:\Windows\Temp )           |</text>
  <text x="32" y="173" font-size="13" class="mono cyan">  |   [2]  Don Cache    ( Prefetch, Recent, DNS )              |</text>
  <text x="32" y="191" font-size="13" class="mono cyan">  |   [3]  Don Downloads( file rac .tmp .log .bak .old )       |</text>
  <text x="32" y="209" font-size="13" class="mono cyan">  |   [4]  Don Recycle Bin ( Thung rac )                      |</text>
  <text x="32" y="227" font-size="13" class="mono yellow" font-weight="bold">  |   [5]  Chay toan bo ( Tat ca buoc tren )                   |</text>
  <text x="32" y="245" font-size="13" class="mono cyan">  |   [6]  Mo Dashboard ( Xem thong ke trinh duyet )           |</text>
  <text x="32" y="263" font-size="13" class="mono magenta" font-weight="bold">  |   [7]  Dinh ky tu dong ( Cai / Xem / Xoa lich )           |</text>
  <text x="32" y="281" font-size="13" class="mono dim">  |   [0]  Thoat                                               |</text>
  <text x="32" y="299" font-size="13" class="mono dim">  +==============================================================+</text>

  <!-- Bottom status -->
  <text x="32" y="323" font-size="13" class="mono">
    <tspan fill="#555">   Phien nay: </tspan>
    <tspan fill="#0dbc79" font-weight="bold">75 file da xoa</tspan>
    <tspan fill="#555">  |  Giai phong: </tspan>
    <tspan fill="#e5e510" font-weight="bold">15 MB</tspan>
  </text>
</svg>
